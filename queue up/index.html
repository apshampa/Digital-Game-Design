<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Queue Up!</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23C17C5E'/%3E%3Cpath fill='%23F5F0E8' d='M8 22V10h6q3 0 5 1.8t2 4.2-2 4.2-5 1.8h-3v4H8zm4-8v4h2q1.2 0 2-.6t.8-1.4-.8-1.4-2-.6h-2z'/%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<audio id="bg-music" src="MainBG.mp3" loop></audio>
<!-- ═══════════════════ TITLE SCREEN ═══════════════════ -->
<div id="screen-title" class="screen active">
  <div class="title-scene">

    <!-- Ambient floating shapes -->
    <div class="ambient-shapes">
      <div class="amb-shape amb-c1"></div>
      <div class="amb-shape amb-c2"></div>
      <div class="amb-shape amb-r1"></div>
      <div class="amb-shape amb-r2"></div>
      <div class="amb-shape amb-t1"></div>
    </div>

    <!-- Sample queue preview -->
    <div class="title-queue-preview">
      <div class="preview-char pc1"></div>
      <div class="preview-char pc2"></div>
      <div class="preview-char pc3"></div>
      <div class="preview-char pc4"></div>
      <div class="preview-char pc5"></div>
    </div>

    <div class="title-content">
      <div class="title-eyebrow">A PRIORITY PUZZLE GAME</div>
      <h1 class="title-wordmark">Queue<br/>Up!</h1>
      <p class="title-tagline">Drag the right people<br/>to the right place.</p>
      <button class="btn-play" id="btn-title-play">Let's Go →</button>
    </div>

  </div>
</div>

<!-- ═══════════════════ SCENARIO SELECT ═══════════════════ -->
<div id="screen-select" class="screen">
  <div class="select-wrap">

    <div class="select-header">
      <span class="select-label">CHOOSE YOUR QUEUE</span>
      <h2 class="select-title">Where to today?</h2>
    </div>

    <div class="scenario-grid">

      <button class="scen-card" data-scenario="airport">
        <div class="scen-preview airport-preview">
          <!-- Mini isometric airport scene -->
          <svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
            <!-- Floor -->
            <rect width="220" height="160" fill="#E8E2D8"/>
            <!-- Floor tiles -->
            <rect x="0" y="100" width="220" height="60" fill="#DDD7CC"/>
            <line x1="0" y1="100" x2="220" y2="100" stroke="#C8C2B5" stroke-width="1"/>
            <line x1="55" y1="100" x2="55" y2="160" stroke="#C8C2B5" stroke-width="0.5" opacity="0.6"/>
            <line x1="110" y1="100" x2="110" y2="160" stroke="#C8C2B5" stroke-width="0.5" opacity="0.6"/>
            <line x1="165" y1="100" x2="165" y2="160" stroke="#C8C2B5" stroke-width="0.5" opacity="0.6"/>
            <!-- Counter -->
            <rect x="10" y="55" width="200" height="45" rx="4" fill="#B5A898"/>
            <rect x="10" y="55" width="200" height="12" rx="4" fill="#8C7B6E"/>
            <!-- Counter top -->
            <rect x="10" y="50" width="200" height="8" rx="2" fill="#9E8E80"/>
            <!-- Windows behind -->
            <rect x="20" y="8" width="50" height="40" rx="3" fill="#7BA8C4" opacity="0.7"/>
            <rect x="85" y="8" width="50" height="40" rx="3" fill="#7BA8C4" opacity="0.7"/>
            <rect x="150" y="8" width="50" height="40" rx="3" fill="#7BA8C4" opacity="0.7"/>
            <!-- Departure board -->
            <rect x="70" y="14" width="80" height="24" rx="3" fill="#2A2A2A"/>
            <rect x="75" y="18" width="70" height="15" rx="2" fill="#1A3A2A"/>
            <text x="110" y="29" text-anchor="middle" fill="#4AF090" font-size="5" font-family="monospace">✈ GATE B7</text>
            <!-- Mini characters in queue -->
            <g transform="translate(30,108)">
              <rect x="0" y="0" width="18" height="22" rx="4" fill="#C17C5E"/>
              <ellipse cx="9" cy="-8" rx="9" ry="9" fill="#C17C5E"/>
              <circle cx="6" cy="-9" r="1.5" fill="#2A2A2A"/>
              <circle cx="12" cy="-9" r="1.5" fill="#2A2A2A"/>
            </g>
            <g transform="translate(60,112)">
              <rect x="0" y="0" width="16" height="19" rx="4" fill="#7B9E87"/>
              <circle cx="8" cy="-7" r="8" fill="#7B9E87"/>
              <circle cx="5" cy="-8" r="1.5" fill="#2A2A2A"/>
              <circle cx="11" cy="-8" r="1.5" fill="#2A2A2A"/>
            </g>
            <g transform="translate(88,115)">
              <rect x="0" y="0" width="14" height="17" rx="4" fill="#B8A9D4"/>
              <circle cx="7" cy="-6" r="7" fill="#B8A9D4"/>
            </g>
          </svg>
        </div>
        <div class="scen-info">
          <div class="scen-icon">✈</div>
          <div class="scen-name">Airport</div>
          <div class="scen-desc">Who boards first?</div>
          <div class="scen-badge">3 LEVELS</div>
        </div>
      </button>

      <button class="scen-card" data-scenario="cafe">
        <div class="scen-preview cafe-preview">
          <svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
            <rect width="220" height="160" fill="#F2E8DC"/>
            <rect x="0" y="100" width="220" height="60" fill="#E8DDD0"/>
            <line x1="0" y1="100" x2="220" y2="100" stroke="#D5C9BC" stroke-width="1"/>
            <!-- Chalkboard -->
            <rect x="20" y="10" width="80" height="60" rx="3" fill="#3D5244"/>
            <text x="60" y="30" text-anchor="middle" fill="#F2E8DC" font-size="7" font-family="serif" opacity="0.9">Menu</text>
            <line x1="30" y1="35" x2="90" y2="35" stroke="#F2E8DC" stroke-width="0.5" opacity="0.4"/>
            <text x="60" y="47" text-anchor="middle" fill="#E8C87A" font-size="5.5" font-family="serif">☕ Espresso</text>
            <text x="60" y="58" text-anchor="middle" fill="#E8C87A" font-size="5.5" font-family="serif">🥐 Croissant</text>
            <!-- Counter -->
            <rect x="110" y="20" width="100" height="75" rx="4" fill="#8C6B50"/>
            <rect x="110" y="20" width="100" height="15" rx="4" fill="#7A5C42"/>
            <rect x="120" y="38" width="30" height="42" rx="3" fill="#6B4D35"/>
            <circle cx="135" cy="55" r="7" fill="#4A3020"/>
            <circle cx="150" cy="78" r="5" fill="#5E3F28"/>
            <!-- Mini chars -->
            <g transform="translate(22,108)">
              <rect x="0" y="0" width="20" height="24" rx="5" fill="#D4956A"/>
              <circle cx="10" cy="-9" r="9" fill="#D4956A"/>
              <circle cx="6" cy="-10" r="1.8" fill="#2A2A2A"/>
              <circle cx="14" cy="-10" r="1.8" fill="#2A2A2A"/>
            </g>
            <g transform="translate(55,112)">
              <rect x="0" y="0" width="17" height="20" rx="4" fill="#9DB5A0"/>
              <circle cx="8.5" cy="-7" r="8" fill="#9DB5A0"/>
            </g>
          </svg>
        </div>
        <div class="scen-info">
          <div class="scen-icon">☕</div>
          <div class="scen-name">Café</div>
          <div class="scen-desc">Who needs it most?</div>
          <div class="scen-badge">3 LEVELS</div>
        </div>
      </button>

      <button class="scen-card" data-scenario="hospital">
        <div class="scen-preview hospital-preview">
          <svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
            <rect width="220" height="160" fill="#E8EFF0"/>
            <rect x="0" y="100" width="220" height="60" fill="#DDE7E8"/>
            <line x1="0" y1="100" x2="220" y2="100" stroke="#C5D4D6" stroke-width="1"/>
            <!-- Reception desk -->
            <rect x="30" y="40" width="160" height="58" rx="5" fill="#8FB5B8"/>
            <rect x="30" y="40" width="160" height="14" rx="5" fill="#6E9EA2"/>
            <text x="110" y="51" text-anchor="middle" fill="white" font-size="6.5" font-family="sans-serif" font-weight="600">RECEPTION</text>
            <!-- Cross sign -->
            <rect x="95" y="8" width="30" height="28" rx="4" fill="white" stroke="#B05A5A" stroke-width="1.5"/>
            <rect x="103" y="12" width="14" height="20" rx="2" fill="#B05A5A"/>
            <rect x="98" y="17" width="24" height="10" rx="2" fill="#B05A5A"/>
            <!-- Chairs -->
            <rect x="40" y="62" width="28" height="18" rx="3" fill="#A8C4C6"/>
            <rect x="78" y="62" width="28" height="18" rx="3" fill="#A8C4C6"/>
            <!-- Mini chars -->
            <g transform="translate(25,108)">
              <rect x="0" y="0" width="18" height="22" rx="5" fill="#C4867A"/>
              <circle cx="9" cy="-8" r="9" fill="#C4867A"/>
              <circle cx="5" cy="-9" r="1.5" fill="#2A2A2A"/>
              <circle cx="13" cy="-9" r="1.5" fill="#2A2A2A"/>
            </g>
            <g transform="translate(56,113)">
              <rect x="0" y="0" width="16" height="17" rx="4" fill="#7BA89C"/>
              <circle cx="8" cy="-6" r="7.5" fill="#7BA89C"/>
            </g>
          </svg>
        </div>
        <div class="scen-info">
          <div class="scen-icon">🏥</div>
          <div class="scen-name">Hospital</div>
          <div class="scen-desc">Who's seen first?</div>
          <div class="scen-badge">3 LEVELS</div>
        </div>
      </button>

      <button class="scen-card" data-scenario="busstop">
        <div class="scen-preview busstop-preview">
          <svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
            <rect width="220" height="160" fill="#E4EDE0"/>
            <rect x="0" y="100" width="220" height="60" fill="#D8E5D2"/>
            <line x1="0" y1="100" x2="220" y2="100" stroke="#C0D4B8" stroke-width="1"/>
            <!-- Shelter -->
            <rect x="30" y="18" width="140" height="75" rx="4" fill="rgba(130,180,140,0.3)" stroke="#6B9E75" stroke-width="1.5"/>
            <rect x="30" y="18" width="140" height="12" rx="4" fill="#6B9E75"/>
            <rect x="30" y="26" width="6" height="70" fill="#6B9E75"/>
            <rect x="164" y="26" width="6" height="70" fill="#6B9E75"/>
            <!-- Bus sign -->
            <rect x="178" y="22" width="30" height="22" rx="3" fill="#C0392B"/>
            <text x="193" y="30" text-anchor="middle" fill="white" font-size="5" font-family="sans-serif" font-weight="700">BUS</text>
            <text x="193" y="39" text-anchor="middle" fill="white" font-size="5" font-family="sans-serif" font-weight="700">STOP</text>
            <!-- Bench -->
            <rect x="55" y="75" width="110" height="8" rx="3" fill="#7A5C42"/>
            <rect x="64" y="83" width="7" height="12" rx="2" fill="#7A5C42"/>
            <rect x="149" y="83" width="7" height="12" rx="2" fill="#7A5C42"/>
            <!-- Road -->
            <rect x="0" y="140" width="220" height="20" fill="#8A8A8A" opacity="0.4"/>
            <!-- Mini chars -->
            <g transform="translate(30,106)">
              <rect x="0" y="0" width="17" height="21" rx="5" fill="#C9A882"/>
              <circle cx="8.5" cy="-8" r="8" fill="#C9A882"/>
            </g>
            <g transform="translate(60,110)">
              <rect x="0" y="0" width="15" height="18" rx="4" fill="#8BA896"/>
              <circle cx="7.5" cy="-7" r="7" fill="#8BA896"/>
            </g>
          </svg>
        </div>
        <div class="scen-info">
          <div class="scen-icon">🚌</div>
          <div class="scen-name">Bus Stop</div>
          <div class="scen-desc">Who boards next?</div>
          <div class="scen-badge">3 LEVELS</div>
        </div>
      </button>

    </div>
  </div>
</div>

<!-- ═══════════════════ GAME SCREEN ═══════════════════ -->
<div id="screen-game" class="screen">

  <!-- Full-screen scene background (SVG isometric illustration) -->
  <div id="scene-container" class="scene-container">
    <svg id="scene-svg" class="scene-svg" viewBox="0 0 390 700"
         preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- Characters are absolutely positioned over the scene -->
    <div id="char-field" class="char-field"></div>

    <!-- Queue position markers (numbered spots on the floor) -->
    <div id="queue-slots" class="queue-slots"></div>
  </div>

  <!-- HUD: floating glass top bar -->
  <div class="hud-top">
    <button class="hud-btn" id="btn-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="hud-center">
      <span id="hud-scene" class="hud-scene-name"></span>
      <span id="hud-level" class="hud-level-name"></span>
    </div>
    <div class="hud-score">
      <span class="score-star">★</span>
      <span id="score-val">0</span>
    </div>
  </div>

  <!-- Instruction ribbon -->
  <div class="instruction-ribbon">
    <span id="ribbon-text"></span>
  </div>

  <!-- HUD: floating glass bottom bar -->
  <div class="hud-bottom">
    <div class="harmony-wrap">
      <span class="harmony-emoji" id="h-emoji-left">😤</span>
      <div class="harmony-track">
        <div class="harmony-fill" id="harmony-fill"></div>
        <div class="harmony-label" id="harmony-label">0%</div>
      </div>
      <span class="harmony-emoji" id="h-emoji-right">😊</span>
    </div>
    <div class="queue-hint">← drag to reorder →</div>
  </div>

  <!-- Win overlay -->
  <div id="overlay-win" class="overlay hidden">
    <div class="ov-card">
      <div class="ov-chars" id="ov-chars"></div>
      <div class="ov-title" id="ov-title">Queue Sorted!</div>
      <div class="ov-pts">+<span id="ov-pts-val">0</span> pts</div>
      <button class="ov-btn-primary" id="btn-next">Next Level →</button>
      <button class="ov-btn-ghost" id="btn-menu">Choose Scenario</button>
    </div>
  </div>

  <!-- All done overlay -->
  <div id="overlay-done" class="overlay hidden">
    <div class="ov-card golden">
      <div class="ov-trophy">🏆</div>
      <div class="ov-title">All Done!</div>
      <div class="ov-sub">You're the Queue Champion.</div>
      <div class="ov-pts">Total: <span id="ov-total">0</span> pts</div>
      <button class="ov-btn-primary" id="btn-again">Play Again</button>
      <button class="ov-btn-ghost" id="btn-menu2">New Scenario</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
